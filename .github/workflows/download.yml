name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL do vídeo do YouTube'
        required: true
      quality:
        description: 'Altura máxima: 2160, 1440, 1080, 720, 480, 360 ou best'
        required: true
        default: 'best'
      start_time:
        description: 'Início do recorte HH:MM:SS (opcional)'
        required: false
        default: ''
      end_time:
        description: 'Fim do recorte HH:MM:SS (opcional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar yt-dlp e ffmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp

      - name: Escrever cookies a partir do Secret
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          mkdir -p cookies
          printf '%s\n' "$YT_COOKIES" > cookies/yt-cookies.txt
          if [ ! -s cookies/yt-cookies.txt ]; then
            echo "❌ Secret YT_COOKIES vazio ou não configurado. Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✅ Cookies escritos ($(wc -l < cookies/yt-cookies.txt) linhas)."

      - name: Montar formato de qualidade
        id: fmt
        run: |
          Q="${{ github.event.inputs.quality }}"
          if [ -z "$Q" ] || [ "$Q" = "best" ]; then
            echo "fmt=bestvideo+bestaudio/best" >> "$GITHUB_OUTPUT"
          else
            echo "fmt=bestvideo[height<=${Q}]+bestaudio/best" >> "$GITHUB_OUTPUT"
          fi

      - name: Montar recorte (opcional)
        id: cut
        run: |
          S="${{ github.event.inputs.start_time }}"
          E="${{ github.event.inputs.end_time }}"
          if [ -n "$S" ] && [ -n "$E" ]; then
            echo "args=--download-sections *${S}-${E} --force-keyframes-at-cuts" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Baixar vídeo
        run: |
          yt-dlp \
            --cookies cookies/yt-cookies.txt \
            --format "${{ steps.fmt.outputs.fmt }}" \
            --merge-output-format mp4 \
            --output "video.%(ext)s" \
            --no-playlist \
            --retries 5 \
            --fragment-retries 5 \
            ${{ steps.cut.outputs.args }} \
            "${{ github.event.inputs.url }}"

      - name: Preparar arquivo final
        run: |
          mv video.* output.mp4
          ls -lh output.mp4

      - name: Publicar como Release (fica salvo no GitHub, sem expirar em 90 dias)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "video-${{ github.run_id }}" output.mp4 \
            --title "Vídeo — run ${{ github.run_number }}" \
            --notes "Origem: ${{ github.event.inputs.url }}
Qualidade solicitada: ${{ github.event.inputs.quality }}"

      - name: Upload como Artifact (backup rápido, expira em 90 dias)
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: output.mp4
          retention-days: 90
          if-no-files-found: error
